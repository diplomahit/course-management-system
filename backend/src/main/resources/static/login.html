<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 教务管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 420px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .logo p {
            color: #999;
            font-size: 14px;
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-group input::placeholder {
            color: #bbb;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        .demo-info {
            background: #f0f5ff;
            border: 1px solid #adc6ff;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .demo-info h4 {
            color: #2f54eb;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .demo-info p {
            color: #666;
            font-size: 12px;
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="logo">
                <div class="logo-icon">🎓</div>
                <h1>教务管理系统</h1>
                <p>Course Management System</p>
            </div>
            
            <div class="demo-info" v-if="showDemo">
                <h4>📝 测试账号 (密码统一: 111111)</h4>
                <p>管理员: admin</p>
                <p>学生: zhangsan / lisi / wangwu / zhaoliu</p>
                <p>老师: liujiaoshou / chenfujiaoshou / wangjiangshi</p>
            </div>
            
            <div class="error-msg" v-if="errorMsg">
                ⚠️ {{ errorMsg }}
            </div>
            
            <form @submit.prevent="login">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" v-model="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" v-model="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn" :disabled="loading">
                    {{ loading ? '登录中...' : '登 录' }}
                </button>
            </form>
            
            <div class="footer">
                © 2026 教务管理系统 · 技术支持
            </div>
        </div>
    </div>
    
    <script>
    const { createApp } = Vue;
    
    createApp({
        data() {
            return {
                username: '',
                password: '',
                loading: false,
                errorMsg: '',
                showDemo: true
            }
        },
        mounted() {
            const token = localStorage.getItem('token');
            if (token) {
                this.redirectToMain();
            }
        },
        methods: {
            async login() {
                if (!this.username || !this.password) {
                    this.errorMsg = '请输入用户名和密码';
                    return;
                }
                
                this.loading = true;
                this.errorMsg = '';
                
                try {
                    const res = await axios.post('/course/api/auth/login', {
                        username: this.username,
                        password: this.password
                    });
                    
                    if (res.data.code === 200) {
                        const data = res.data.data;
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('username', data.username);
                        localStorage.setItem('nickname', data.nickname || data.username);
                        localStorage.setItem('userType', data.userType);
                        localStorage.setItem('role', data.role);
                        localStorage.setItem('userId', data.userId);
                        
                        if (data.profile) {
                            localStorage.setItem('profile', JSON.stringify(data.profile));
                        }
                        
                        this.redirectToMain();
                    } else {
                        this.errorMsg = res.data.message || '登录失败';
                    }
                } catch (e) {
                    this.errorMsg = '登录失败：' + (e.response?.data?.message || '网络错误');
                } finally {
                    this.loading = false;
                }
            },
            redirectToMain() {
                window.location.href = '/course/';
            }
        }
    }).mount('#app');
    </script>
</body>
</html>
